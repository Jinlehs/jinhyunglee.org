name = "jinhyunglee"
compatibility_date = "2025-05-22"
main = "src/worker.js"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"

[[kv_namespaces]]
binding = "BLOG_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[[routes]]
pattern = "resume.jinhyunglee.org/*"
zone_name = "jinhyunglee.org"
